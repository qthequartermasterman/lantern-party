<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Lantern Party – Fib 🏮</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1020;
      --surface: #2a1f35;
      --surface2: #3a2d4a;
      --primary: #f5a623;
      --primary-dark: #d4891a;
      --accent: #e8645a;
      --green: #52c97a;
      --purple: #a06be0;
      --text: #f0e8ff;
      --text-muted: #9080b0;
      --radius: 14px;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    #top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1.2rem;
      background: var(--surface);
      border-bottom: 1px solid rgba(245,166,35,0.15);
      flex-shrink: 0;
    }
    #top-bar .brand { font-size: 1rem; font-weight: 800; color: var(--primary); }
    #top-timer { font-size: 1.2rem; font-weight: 800; }
    #top-timer.urgent { color: var(--accent); }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1.5rem 1rem 2rem;
      overflow-y: auto;
    }

    /* ── Screens ── */
    .screen { width: 100%; max-width: 480px; display: none; }
    .screen.active { display: flex; flex-direction: column; }

    /* ── Join ── */
    #join-screen { align-items: center; text-align: center; padding-top: 1rem; }
    #join-screen .logo { font-size: 3.5rem; margin-bottom: 0.5rem; }
    #join-screen h1 { font-size: 2rem; font-weight: 900; color: var(--primary); margin-bottom: 0.3rem; }
    .code-hint { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.35rem;
      align-self: flex-start;
    }
    input[type="text"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid rgba(245,166,35,0.2);
      border-radius: 10px;
      color: var(--text);
      font-size: 1.05rem;
      padding: 0.7rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--primary); }
    input[type="text"]::placeholder, textarea::placeholder { color: var(--text-muted); }
    textarea { resize: none; min-height: 90px; font-family: inherit; }

    .btn {
      display: block;
      width: 100%;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #1a1020;
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .error-msg {
      background: rgba(232,100,90,0.15);
      border: 1px solid rgba(232,100,90,0.4);
      border-radius: 8px;
      color: #f08080;
      font-size: 0.9rem;
      padding: 0.5rem 0.8rem;
      margin-bottom: 0.8rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Lobby ── */
    #lobby-screen { align-items: center; text-align: center; padding-top: 2rem; }
    .lobby-title { font-size: 1.8rem; font-weight: 900; color: var(--primary); margin-bottom: 0.5rem; }
    .lobby-sub { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }
    .ready-toggle {
      display: flex;
      gap: 0.7rem;
      margin-top: 1.5rem;
    }
    .ready-toggle .btn { flex: 1; }

    /* ── Prompt card (collecting / waiting) ── */
    .prompt-card {
      background: var(--surface);
      border: 1px solid rgba(245,166,35,0.2);
      border-radius: var(--radius);
      padding: 1.4rem;
      margin-bottom: 1.2rem;
      width: 100%;
    }
    .prompt-meta { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    .prompt-text { font-size: 1.15rem; font-weight: 600; line-height: 1.5; }
    .blank { color: var(--primary); }

    /* ── Waiting pill ── */
    .waiting-pill {
      background: var(--surface2);
      border-radius: 99px;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 0.5rem;
    }

    /* ── Vote choices ── */
    .vote-list { list-style: none; width: 100%; }
    .vote-item {
      background: var(--surface);
      border: 2px solid rgba(245,166,35,0.12);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.7rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .vote-item:hover { border-color: var(--primary); }
    .vote-item.selected { border-color: var(--primary); background: rgba(245,166,35,0.1); }
    .vote-item.own-answer { opacity: 0.4; cursor: not-allowed; pointer-events: none; font-style: italic; }

    /* ── Reveal ── */
    .reveal-list { list-style: none; width: 100%; }
    .reveal-item {
      background: var(--surface);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.7rem;
    }
    .reveal-item.truth-item { border-color: var(--green); }
    .reveal-item.voted-correct { background: rgba(82,201,122,0.1); }
    .reveal-truth-badge {
      display: inline-block;
      background: var(--green);
      color: #0e1f14;
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 0.12rem 0.45rem;
      margin-bottom: 0.25rem;
    }
    .reveal-answer { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.35rem; }
    .reveal-footer { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
    .reveal-submitter { color: var(--accent); font-weight: 600; }
    .like-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 0.2rem 0.7rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .like-btn.liked { background: rgba(160,107,224,0.2); color: var(--purple); border-color: var(--purple); }
    .like-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Scores ── */
    .scores-title { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-bottom: 1rem; text-align: center; }
    .score-row {
      display: flex; align-items: center; gap: 0.8rem;
      background: var(--surface); border-radius: 10px;
      padding: 0.75rem 1rem; margin-bottom: 0.6rem;
      border: 1px solid rgba(245,166,35,0.1);
    }
    .score-rank { font-weight: 900; color: var(--text-muted); min-width: 1.5rem; text-align: center; }
    .score-rank.top { color: var(--primary); }
    .score-name { flex: 1; font-weight: 700; }
    .score-pts { font-size: 1.1rem; font-weight: 900; color: var(--primary); }

    /* ── Game Over ── */
    #gameover-screen { align-items: center; text-align: center; padding-top: 1.5rem; }
    .go-trophy { font-size: 4rem; margin-bottom: 0.5rem; }
    .go-title { font-size: 1.8rem; font-weight: 900; color: var(--primary); margin-bottom: 0.3rem; }
    .go-sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .thumbs-cup { font-size: 0.95rem; color: var(--purple); margin-bottom: 1.5rem; }
  </style>
</head>
<body>

<div id="top-bar">
  <span class="brand">🏮 Fib</span>
  <span id="top-timer"></span>
</div>

<div id="main">

  <!-- ── Join ── -->
  <div class="screen active" id="join-screen">
    <div class="logo">🏮</div>
    <h1>Fib</h1>
    <p class="code-hint" id="join-code-hint">Enter your name to join</p>
    <label for="nameInput">Your Name</label>
    <input type="text" id="nameInput" placeholder="e.g. MysticLiar" maxlength="20" autocomplete="off" style="margin-bottom:1.2rem;" />
    <div class="error-msg" id="joinError"></div>
    <button class="btn btn-primary" id="joinBtn">Join Game</button>
  </div>

  <!-- ── Lobby ── -->
  <div class="screen" id="lobby-screen">
    <div class="lobby-title" id="lobby-name"></div>
    <p class="lobby-sub">Waiting for the host to start…</p>
    <p style="font-size:0.85rem; color:var(--text-muted); text-align:center;">
      Make sure everyone is ready, then the host starts the game.
    </p>
    <div class="ready-toggle">
      <button class="btn btn-primary" id="readyBtn">I'm Ready!</button>
      <button class="btn btn-secondary" id="unreadyBtn" style="display:none;">Not Ready</button>
    </div>
  </div>

  <!-- ── Collecting lies ── -->
  <div class="screen" id="collecting-screen">
    <div class="prompt-card">
      <div class="prompt-meta" id="collect-meta"></div>
      <div class="prompt-text" id="collect-prompt"></div>
    </div>
    <div id="collect-submitted" style="display:none">
      <div class="waiting-pill">✓ Lie submitted – waiting for others…</div>
    </div>
    <div id="collect-form">
      <label for="lieInput">Your lie</label>
      <textarea id="lieInput" placeholder="Type a convincing fake answer…" maxlength="150" rows="3"></textarea>
      <div class="error-msg" id="lieError"></div>
      <button class="btn btn-primary" id="submitLieBtn">Submit Lie</button>
      <button class="btn btn-ghost" id="lieForMeBtn" style="margin-top:0.5rem;">🎲 Lie for me!</button>
    </div>
  </div>

  <!-- ── Voting ── -->
  <div class="screen" id="voting-screen">
    <div class="prompt-card">
      <div class="prompt-meta" id="vote-meta"></div>
      <div class="prompt-text" id="vote-prompt"></div>
    </div>
    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:0.8rem;">
      Which one is the <strong style="color:var(--primary)">truth</strong>?
    </p>
    <ul class="vote-list" id="vote-list"></ul>
    <div id="vote-submitted" style="display:none" class="waiting-pill">✓ Vote cast – waiting for others…</div>
  </div>

  <!-- ── Revealing ── -->
  <div class="screen" id="revealing-screen">
    <div class="prompt-card">
      <div class="prompt-meta" id="reveal-meta"></div>
      <div class="prompt-text" id="reveal-prompt"></div>
    </div>
    <ul class="reveal-list" id="reveal-list"></ul>
    <p style="font-size:0.75rem; color:var(--text-muted); text-align:center; margin-top:0.5rem;">
      Like the lies you enjoyed! 👍
    </p>
  </div>

  <!-- ── Scores ── -->
  <div class="screen" id="scores-screen">
    <div class="scores-title" id="scores-title"></div>
    <div id="scores-list-p"></div>
  </div>

  <!-- ── Game Over ── -->
  <div class="screen" id="gameover-screen">
    <div class="go-trophy">🏆</div>
    <div class="go-title" id="go-title"></div>
    <div class="go-sub" id="go-sub"></div>
    <div class="thumbs-cup" id="go-thumbs"></div>
    <div id="go-scores"></div>
  </div>

</div><!-- #main -->

<script>
  // ── Setup ─────────────────────────────────────────────────────────────
  const partyCode = window.location.pathname.split('/').pop().toUpperCase();
  const urlParams = new URLSearchParams(window.location.search);
  const playerId  = urlParams.get('pid') || crypto.randomUUID();
  document.getElementById('join-code-hint').textContent = `Party code: ${partyCode}`;

  // Persist playerId
  const storageKey = `fib_pid_${partyCode}`;
  const storedPid = sessionStorage.getItem(storageKey);
  const actualPid = storedPid || playerId;
  if (!storedPid) sessionStorage.setItem(storageKey, actualPid);

  let playerName = sessionStorage.getItem('playerName') || '';
  let isReady = false;
  let likedChoices = new Set();
  let myVoteIndex = null;

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showError(el, msg) { el.textContent = msg; el.classList.add('visible'); }
  function clearError(el) { el.classList.remove('visible'); }

  function highlightBlank(txt) {
    return txt.replace(/_____/g, '<span class="blank">_____</span>');
  }

  // ── Timer ─────────────────────────────────────────────────────────────
  let timerInterval = null;
  let localTimer = 0;
  function startLocalTimer(s) {
    clearInterval(timerInterval);
    localTimer = s;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      localTimer = Math.max(0, localTimer - 1);
      updateTimerDisplay();
      if (localTimer === 0) clearInterval(timerInterval);
    }, 1000);
  }
  function updateTimerDisplay() {
    const el = document.getElementById('top-timer');
    el.textContent = localTimer > 0 ? `⏱ ${localTimer}s` : '';
    el.className = (localTimer > 0 && localTimer <= 10) ? 'urgent' : '';
  }

  // ── WebSocket ─────────────────────────────────────────────────────────
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws/${partyCode}/player/${actualPid}`);

  ws.addEventListener('message', e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    const { type, data } = msg;

    if (type === 'timer')       { startLocalTimer(data.seconds_remaining); return; }
    if (type === 'error')       { handleError(data); return; }
    if (type === 'lobby_state') { handleLobby(data); return; }
    if (type === 'fib_question'){ handleQuestion(data); return; }
    if (type === 'fib_voting')  { handleVoting(data); return; }
    if (type === 'fib_reveal')  { handleReveal(data); return; }
    if (type === 'fib_scores')  { handleScores(data); return; }
    if (type === 'game_over')   { handleGameOver(data); return; }
    if (type === 'game_state')  { handleGameState(data); return; }
    if (type === 'like_update') { handleLikeUpdate(data); return; }
  });

  function send(type, data) {
    ws.send(JSON.stringify({ type, data }));
  }

  // ── Join ──────────────────────────────────────────────────────────────
  // Pre-fill name from index page if stored
  if (playerName) document.getElementById('nameInput').value = playerName;

  document.getElementById('joinBtn').addEventListener('click', () => {
    const name = document.getElementById('nameInput').value.trim();
    clearError(document.getElementById('joinError'));
    if (!name) { showError(document.getElementById('joinError'), 'Enter your name.'); return; }
    playerName = name;
    sessionStorage.setItem('playerName', name);
    send('join', { name });
  });
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('joinBtn').click();
  });

  // ── Lobby ─────────────────────────────────────────────────────────────
  function handleLobby(data) {
    const me = data.players.find(p => p.id === actualPid);
    if (!me) {
      // Not yet in the player list – show join screen
      if (playerName) send('join', { name: playerName });
      return;
    }
    document.getElementById('lobby-name').textContent = `Hey, ${me.name}! 👋`;
    isReady = me.ready;
    document.getElementById('readyBtn').style.display   = me.ready ? 'none' : 'block';
    document.getElementById('unreadyBtn').style.display = me.ready ? 'block' : 'none';
    show('lobby-screen');
  }

  document.getElementById('readyBtn').addEventListener('click', () => {
    send('ready', { ready: true });
  });
  document.getElementById('unreadyBtn').addEventListener('click', () => {
    send('ready', { ready: false });
  });

  // ── Collecting lies ───────────────────────────────────────────────────
  function handleQuestion(data) {
    document.getElementById('collect-meta').textContent =
      `Round ${data.round_num} · Q${data.question_num}/${data.total_questions} · ${data.category || ''}`;
    document.getElementById('collect-prompt').innerHTML = highlightBlank(data.prompt);
    document.getElementById('lieInput').value = '';
    document.getElementById('lieInput').disabled = false;
    document.getElementById('submitLieBtn').disabled = false;
    document.getElementById('lieForMeBtn').disabled = false;
    clearError(document.getElementById('lieError'));
    document.getElementById('collect-submitted').style.display = 'none';
    document.getElementById('collect-form').style.display = 'block';
    show('collecting-screen');
  }

  document.getElementById('submitLieBtn').addEventListener('click', () => {
    const text = document.getElementById('lieInput').value.trim();
    clearError(document.getElementById('lieError'));
    if (!text) { showError(document.getElementById('lieError'), 'Enter a lie first!'); return; }
    send('submit_lie', { text, lie_for_me: false });
    showSubmitted();
  });

  document.getElementById('lieForMeBtn').addEventListener('click', () => {
    clearError(document.getElementById('lieError'));
    send('submit_lie', { lie_for_me: true });
    showSubmitted();
  });

  document.getElementById('lieInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('submitLieBtn').click(); }
  });

  function showSubmitted() {
    document.getElementById('collect-form').style.display = 'none';
    document.getElementById('collect-submitted').style.display = 'block';
  }

  // ── Voting ────────────────────────────────────────────────────────────
  let votingChoices = [];
  let ownChoiceIndex = null;

  function handleVoting(data) {
    votingChoices = data.choices;
    ownChoiceIndex = null;
    myVoteIndex = null;
    likedChoices = new Set();

    document.getElementById('vote-meta').textContent = data.category || '';
    document.getElementById('vote-prompt').innerHTML = highlightBlank(data.prompt);

    const list = document.getElementById('vote-list');
    list.innerHTML = data.choices.map(c => `
      <li class="vote-item" data-index="${c.index}">${c.text}</li>
    `).join('');

    document.getElementById('vote-submitted').style.display = 'none';
    document.getElementById('vote-list').style.display = 'block';
    show('voting-screen');
  }

  document.getElementById('vote-list').addEventListener('click', e => {
    const item = e.target.closest('.vote-item');
    if (!item || item.classList.contains('own-answer')) return;
    if (myVoteIndex !== null) return; // already voted

    const idx = parseInt(item.dataset.index, 10);
    if (ownChoiceIndex !== null && idx === ownChoiceIndex) return;

    myVoteIndex = idx;
    document.querySelectorAll('.vote-item').forEach(el => el.classList.remove('selected'));
    item.classList.add('selected');
    send('submit_vote', { choice_index: idx });
    setTimeout(() => {
      document.getElementById('vote-submitted').style.display = 'block';
      document.getElementById('vote-list').style.display = 'none';
    }, 500);
  });

  // ── Revealing ─────────────────────────────────────────────────────────
  function handleReveal(data) {
    document.getElementById('reveal-meta').textContent = data.truth ? `Truth: ${data.truth}` : '';
    document.getElementById('reveal-prompt').innerHTML = highlightBlank(data.prompt);

    const list = document.getElementById('reveal-list');
    list.innerHTML = data.choices.map(c => {
      const isTruth = c.is_truth;
      const iVoted = myVoteIndex === c.index;
      const isOwnLie = !isTruth && c.submitter_id === actualPid;

      let footerHtml = '';
      if (isTruth) {
        footerHtml = `<span>${iVoted ? '✓ You got it!' : ''}</span>`;
      } else {
        const gp = c.game_provided ? ' (auto)' : '';
        const likeBtn = (!isOwnLie && !isTruth)
          ? `<button class="like-btn" data-index="${c.index}" ${likedChoices.has(c.index) ? 'disabled class="like-btn liked"' : ''}>
               👍 <span id="likes-${c.index}">${c.likes || 0}</span>
             </button>` : '';
        footerHtml = `
          <span class="reveal-submitter">${c.submitter_name || '?'}${gp}${isOwnLie ? ' (you)' : ''}</span>
          <span>${c.votes} vote${c.votes !== 1 ? 's' : ''}</span>
          ${likeBtn}`;
      }

      return `
        <li class="reveal-item ${isTruth ? 'truth-item' : ''} ${iVoted && isTruth ? 'voted-correct' : ''}">
          ${isTruth ? '<div class="reveal-truth-badge">✓ Truth</div>' : ''}
          <div class="reveal-answer">${c.text}</div>
          <div class="reveal-footer">${footerHtml}</div>
        </li>`;
    }).join('');

    show('revealing-screen');
  }

  document.getElementById('reveal-list').addEventListener('click', e => {
    const btn = e.target.closest('.like-btn');
    if (!btn || btn.disabled) return;
    const idx = parseInt(btn.dataset.index, 10);
    if (likedChoices.has(idx)) return;
    likedChoices.add(idx);
    btn.disabled = true;
    btn.classList.add('liked');
    send('submit_like', { choice_index: idx });
  });

  function handleLikeUpdate(data) {
    const el = document.getElementById(`likes-${data.choice_index}`);
    if (el) el.textContent = data.likes;
  }

  // ── Scores ────────────────────────────────────────────────────────────
  function handleScores(data) {
    document.getElementById('scores-title').textContent =
      data.round_complete ? `After Round ${data.round_complete}` : 'Scores';
    const scores = data.scores || [];
    document.getElementById('scores-list-p').innerHTML = scores.map((s, i) => `
      <div class="score-row">
        <span class="score-rank ${i === 0 ? 'top' : ''}">${i + 1}</span>
        <span class="score-name">${s.name}${s.id === actualPid ? ' (you)' : ''}</span>
        <span class="score-pts">${s.score.toLocaleString()}</span>
      </div>`).join('');
    show('scores-screen');
  }

  // ── Game Over ─────────────────────────────────────────────────────────
  function handleGameOver(data) {
    const winners = data.winners || [];
    const isWinner = playerName && winners.includes(playerName);
    document.getElementById('go-title').textContent =
      isWinner ? '🏆 You win!' : (winners.length ? `${winners[0]} wins!` : 'Game Over');
    document.getElementById('go-sub').textContent =
      isWinner ? 'Congratulations!' : (winners.length > 1 ? `It's a tie between ${winners.join(' & ')}` : '');
    const cup = data.thumbs_cup;
    document.getElementById('go-thumbs').textContent =
      cup ? `👍 Thumbs Cup: ${cup}` : '';
    const scores = data.final_scores || [];
    document.getElementById('go-scores').innerHTML = scores.map((s, i) => `
      <div class="score-row">
        <span class="score-rank ${i === 0 ? 'top' : ''}">${i + 1}</span>
        <span class="score-name">${s.name}${s.id === actualPid ? ' (you)' : ''}</span>
        <span class="score-pts">${s.score.toLocaleString()}</span>
      </div>`).join('');
    show('gameover-screen');
  }

  // ── Game state (reconnection) ─────────────────────────────────────────
  function handleGameState(data) {
    if (!data.game || data.game !== 'fib') return;
    const phase = data.phase;
    if (phase === 'lobby') return; // lobby_state handles it
    if (phase === 'collecting_lies') {
      if (data.current_question) handleQuestion({
        prompt: data.current_question.prompt,
        category: data.current_question.category,
        round_num: data.round_num,
        question_num: data.current_question.question_num,
        total_questions: data.current_question.total_questions,
      });
      if (data.submitted_lie) showSubmitted();
    } else if (phase === 'voting') {
      if (data.choices) handleVoting({
        prompt: data.current_question?.prompt || '',
        category: data.current_question?.category || '',
        choices: data.choices,
      });
      ownChoiceIndex = data.own_choice_index ?? null;
      if (data.already_voted) {
        document.getElementById('vote-submitted').style.display = 'block';
        document.getElementById('vote-list').style.display = 'none';
      }
    } else if (phase === 'revealing' && data.reveal) {
      handleReveal(data.reveal);
      if (data.likes_given) data.likes_given.forEach(idx => likedChoices.add(idx));
    } else if (phase === 'scores') {
      handleScores(data);
    } else if (phase === 'game_over') {
      handleGameOver(data);
    }
  }

  // ── Error ─────────────────────────────────────────────────────────────
  function handleError(data) {
    const msg = data.message || 'Something went wrong.';
    // Show error in the right place
    const lieErr = document.getElementById('lieError');
    if (document.getElementById('collecting-screen').classList.contains('active')) {
      showError(lieErr, msg);
      // Re-enable form
      document.getElementById('collect-form').style.display = 'block';
      document.getElementById('collect-submitted').style.display = 'none';
      document.getElementById('submitLieBtn').disabled = false;
      document.getElementById('lieForMeBtn').disabled = false;
    } else {
      alert(msg);
    }
  }
</script>
</body>
</html>
