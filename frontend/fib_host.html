<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lantern Party – Fib Host 🏮</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #120d1a;
      --surface: #1f1630;
      --surface2: #2e2244;
      --primary: #f5a623;
      --primary-dark: #d4891a;
      --accent: #e8645a;
      --green: #52c97a;
      --purple: #a06be0;
      --text: #f0e8ff;
      --text-muted: #9080b0;
      --radius: 14px;
      --glow-gold: 0 0 24px rgba(245,166,35,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    #top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid rgba(245,166,35,0.15);
    }
    #top-bar .brand { font-size: 1.4rem; font-weight: 900; color: var(--primary); }
    #party-code-display {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      color: var(--primary);
      text-shadow: var(--glow-gold);
    }
    #timer-bar {
      font-size: 1.6rem;
      font-weight: 700;
      min-width: 70px;
      text-align: right;
    }
    #timer-bar.urgent { color: var(--accent); }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* ── Screens ── */
    .screen { width: 100%; max-width: 960px; display: none; }
    .screen.active { display: block; }

    /* ── Lobby ── */
    #lobby-screen h2 { text-align: center; font-size: 1.6rem; color: var(--text-muted); margin-bottom: 0.3rem; }
    .lobby-code {
      text-align: center;
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      color: var(--primary);
      text-shadow: var(--glow-gold);
      margin-bottom: 0.5rem;
    }
    .lobby-hint { text-align: center; color: var(--text-muted); margin-bottom: 2rem; }
    #player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .player-tile {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .player-tile.ready { border-color: var(--green); }
    .player-tile .pname { font-weight: 700; font-size: 1rem; margin-bottom: 0.3rem; }
    .player-tile .pstatus { font-size: 0.75rem; color: var(--text-muted); }
    .player-tile.ready .pstatus { color: var(--green); }

    #start-btn {
      display: block;
      margin: 0 auto;
      padding: 1rem 3rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #1a1020;
      border: none;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--glow-gold);
      transition: opacity 0.2s;
    }
    #start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Question card ── */
    .question-card {
      background: var(--surface);
      border: 1px solid rgba(245,166,35,0.2);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .q-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.8rem;
    }
    .q-prompt {
      font-size: clamp(1.3rem, 3vw, 2rem);
      font-weight: 700;
      line-height: 1.4;
    }
    .q-blank { color: var(--primary); font-style: italic; }

    /* ── Progress bar ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .progress-label { color: var(--text-muted); font-size: 0.9rem; min-width: 140px; }
    .progress-bar-wrap {
      flex: 1;
      background: var(--surface2);
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      transition: width 0.3s ease;
    }
    .progress-count { font-size: 0.9rem; color: var(--text-muted); min-width: 50px; text-align: right; }

    /* ── Choice grid (voting / revealing) ── */
    .choice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .choice-card {
      background: var(--surface);
      border: 2px solid rgba(245,166,35,0.15);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      position: relative;
    }
    .choice-card.is-truth { border-color: var(--green); }
    .choice-card.is-lie   { border-color: rgba(255,255,255,0.1); }
    .choice-idx {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    .choice-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.5rem; }
    .choice-footer { font-size: 0.8rem; color: var(--text-muted); }
    .choice-card.is-truth .choice-text { color: var(--green); }
    .choice-votes { font-weight: 700; color: var(--primary); }
    .choice-submitter { color: var(--accent); }
    .truth-badge {
      display: inline-block;
      background: var(--green);
      color: #0e1f14;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      margin-bottom: 0.3rem;
    }
    .game-provided-badge {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      color: var(--text-muted);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      margin-left: 0.4rem;
    }

    /* ── Scores ── */
    .scores-header {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 1.5rem;
    }
    .scores-list { list-style: none; }
    .score-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border-radius: 10px;
      padding: 0.9rem 1.2rem;
      margin-bottom: 0.7rem;
      border: 1px solid rgba(245,166,35,0.12);
    }
    .score-rank { font-size: 1.5rem; font-weight: 900; color: var(--text-muted); min-width: 2rem; text-align: center; }
    .score-rank.top { color: var(--primary); }
    .score-name { flex: 1; font-weight: 700; }
    .score-pts { font-size: 1.4rem; font-weight: 900; color: var(--primary); }

    /* ── Game-over ── */
    .winners-banner {
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .thumbs-cup {
      text-align: center;
      font-size: 1rem;
      color: var(--purple);
      margin-bottom: 2rem;
    }

    /* ── Round/question badge ── */
    .round-badge {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }
    .rbadge {
      background: var(--surface2);
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
    }
    .rbadge.active { background: rgba(245,166,35,0.15); color: var(--primary); }

    #next-btn {
      display: none;
      margin: 1rem auto 0;
      padding: 0.7rem 2rem;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }
    #next-btn.visible { display: block; }
  </style>
</head>
<body>

<div id="top-bar">
  <span class="brand">🏮 Lantern Party — Fib</span>
  <span id="party-code-display"></span>
  <span id="timer-bar"></span>
</div>

<div id="main">

  <!-- ── Lobby ── -->
  <div class="screen active" id="lobby-screen">
    <h2>Waiting for players…</h2>
    <div class="lobby-code" id="lobby-code"></div>
    <p class="lobby-hint">Players join at <strong>lanternparty.app</strong> with the code above</p>
    <div id="player-grid"></div>
    <button id="start-btn" disabled>Start Fib</button>
  </div>

  <!-- ── Collecting lies ── -->
  <div class="screen" id="collecting-screen">
    <div class="round-badge">
      <span class="rbadge" id="round-badge"></span>
      <span class="rbadge" id="question-badge"></span>
    </div>
    <div class="question-card">
      <div class="q-meta" id="collect-category"></div>
      <div class="q-prompt" id="collect-prompt"></div>
    </div>
    <div class="progress-row">
      <span class="progress-label">Lies submitted</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="lies-bar" style="width:0%"></div></div>
      <span class="progress-count" id="lies-count">0/0</span>
    </div>
  </div>

  <!-- ── Voting ── -->
  <div class="screen" id="voting-screen">
    <div class="round-badge">
      <span class="rbadge" id="vote-round-badge"></span>
      <span class="rbadge" id="vote-q-badge"></span>
    </div>
    <div class="question-card">
      <div class="q-meta" id="vote-category"></div>
      <div class="q-prompt" id="vote-prompt"></div>
    </div>
    <div class="progress-row">
      <span class="progress-label">Votes cast</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="votes-bar" style="width:0%"></div></div>
      <span class="progress-count" id="votes-count">0/0</span>
    </div>
    <div class="choice-grid" id="vote-choice-grid"></div>
  </div>

  <!-- ── Revealing ── -->
  <div class="screen" id="revealing-screen">
    <div class="question-card">
      <div class="q-prompt" id="reveal-prompt"></div>
    </div>
    <div class="choice-grid" id="reveal-choice-grid"></div>
    <button id="next-btn">Next →</button>
  </div>

  <!-- ── Scores ── -->
  <div class="screen" id="scores-screen">
    <div class="scores-header" id="scores-header">Scores</div>
    <ul class="scores-list" id="scores-list"></ul>
  </div>

  <!-- ── Game Over ── -->
  <div class="screen" id="gameover-screen">
    <div class="winners-banner" id="winners-banner"></div>
    <div class="thumbs-cup" id="thumbs-cup"></div>
    <div class="scores-header">Final Scores</div>
    <ul class="scores-list" id="final-scores-list"></ul>
  </div>

</div><!-- #main -->

<script>
  // ── Utilities ───────────────────────────────────────────────────────
  const partyCode = window.location.pathname.split('/').pop().toUpperCase();
  document.getElementById('party-code-display').textContent = partyCode;
  document.getElementById('lobby-code').textContent = partyCode;

  function show(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }

  function renderScores(scores, listEl) {
    listEl.innerHTML = scores.map((s, i) => `
      <li class="score-row">
        <span class="score-rank ${i === 0 ? 'top' : ''}">${i + 1}</span>
        <span class="score-name">${s.name}</span>
        <span class="score-pts">${s.score.toLocaleString()}</span>
      </li>`).join('');
  }

  function highlightPrompt(prompt) {
    return prompt.replace(/_____/g, '<span class="q-blank">_____</span>');
  }

  // ── WebSocket ────────────────────────────────────────────────────────
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws/${partyCode}/host`);

  let timerInterval = null;
  let localTimer = 0;

  function startLocalTimer(seconds) {
    clearInterval(timerInterval);
    localTimer = seconds;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      localTimer = Math.max(0, localTimer - 1);
      updateTimerDisplay();
      if (localTimer === 0) clearInterval(timerInterval);
    }, 1000);
  }

  function updateTimerDisplay() {
    const el = document.getElementById('timer-bar');
    el.textContent = localTimer > 0 ? `⏱ ${localTimer}s` : '';
    el.className = localTimer > 0 && localTimer <= 10 ? 'urgent' : '';
  }

  ws.addEventListener('message', e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    const { type, data } = msg;

    if (type === 'timer') {
      startLocalTimer(data.seconds_remaining);
      return;
    }
    if (type === 'lobby_state') { handleLobby(data); return; }
    if (type === 'player_joined' || type === 'player_ready') return; // lobby_state follows
    if (type === 'fib_question') { handleQuestion(data); return; }
    if (type === 'fib_voting')   { handleVoting(data); return; }
    if (type === 'fib_reveal')   { handleReveal(data); return; }
    if (type === 'fib_scores')   { handleScores(data); return; }
    if (type === 'game_over')    { handleGameOver(data); return; }
    if (type === 'game_state')   { handleGameState(data); return; }
    if (type === 'like_update')  { handleLikeUpdate(data); return; }
  });

  // ── Lobby ────────────────────────────────────────────────────────────
  function handleLobby(data) {
    show('lobby-screen');
    const grid = document.getElementById('player-grid');
    grid.innerHTML = data.players.map(p => `
      <div class="player-tile ${p.ready ? 'ready' : ''}">
        <div class="pname">${p.name}</div>
        <div class="pstatus">${p.ready ? '✓ Ready' : 'Waiting…'}</div>
      </div>`).join('');
    const readyCount = data.players.filter(p => p.ready).length;
    const btn = document.getElementById('start-btn');
    btn.disabled = readyCount < 2;
    btn.textContent = readyCount >= 2
      ? `Start Fib (${readyCount} ready)`
      : `Need 2+ ready players`;
  }

  document.getElementById('start-btn').addEventListener('click', () => {
    ws.send(JSON.stringify({ type: 'start_game', data: {} }));
  });

  // ── Game state (for reconnection / partial updates) ──────────────────
  function handleGameState(data) {
    if (!data.game || data.game !== 'fib') return;
    const phase = data.phase;
    if (phase === 'collecting_lies') {
      // update progress
      if (data.lies_received !== undefined) {
        updateProgress('lies-bar', 'lies-count', data.lies_received, data.lies_expected);
      }
      if (data.current_question) {
        renderQuestionCard(data.current_question);
        show('collecting-screen');
      }
    } else if (phase === 'voting') {
      if (data.votes_received !== undefined) {
        updateProgress('votes-bar', 'votes-count', data.votes_received, data.votes_expected);
      }
    } else if (phase === 'scores') {
      renderScoresScreen(data);
    } else if (phase === 'game_over') {
      handleGameOver(data);
    }
  }

  function updateProgress(barId, countId, received, expected) {
    const pct = expected > 0 ? (received / expected * 100) : 0;
    document.getElementById(barId).style.width = pct + '%';
    document.getElementById(countId).textContent = `${received}/${expected}`;
  }

  function renderQuestionCard(q) {
    document.getElementById('collect-category').textContent = q.category || '';
    document.getElementById('collect-prompt').innerHTML = highlightPrompt(q.prompt);
    document.getElementById('round-badge').textContent = `Round ${q.question_num ? q.question_num : ''}`;
    document.getElementById('round-badge').className = 'rbadge active';
    document.getElementById('question-badge').textContent = q.question_num
      ? `Q ${q.question_num} / ${q.total_questions}` : '';
  }

  // ── Collecting lies ───────────────────────────────────────────────────
  function handleQuestion(data) {
    document.getElementById('collect-category').textContent = data.category || '';
    document.getElementById('collect-prompt').innerHTML = highlightPrompt(data.prompt);
    document.getElementById('round-badge').textContent = `Round ${data.round_num}`;
    document.getElementById('round-badge').className = 'rbadge active';
    document.getElementById('question-badge').textContent = `Q ${data.question_num} / ${data.total_questions}`;
    updateProgress('lies-bar', 'lies-count', 0, 0);
    show('collecting-screen');
  }

  // ── Voting ────────────────────────────────────────────────────────────
  function handleVoting(data) {
    document.getElementById('vote-category').textContent = data.category || '';
    document.getElementById('vote-prompt').innerHTML = highlightPrompt(data.prompt);
    document.getElementById('vote-round-badge').textContent = 'Voting';
    document.getElementById('vote-q-badge').textContent = '';
    updateProgress('votes-bar', 'votes-count', 0, 0);

    const grid = document.getElementById('vote-choice-grid');
    grid.innerHTML = data.choices.map(c => `
      <div class="choice-card">
        <div class="choice-idx">Choice ${c.index + 1}</div>
        <div class="choice-text">${c.text}</div>
      </div>`).join('');

    document.getElementById('next-btn').classList.remove('visible');
    show('voting-screen');
  }

  // ── Revealing ─────────────────────────────────────────────────────────
  function handleReveal(data) {
    document.getElementById('reveal-prompt').innerHTML = highlightPrompt(data.prompt);

    const grid = document.getElementById('reveal-choice-grid');
    grid.innerHTML = data.choices.map(c => {
      const isTruth = c.is_truth;
      let footer = '';
      if (isTruth) {
        footer = `<div class="choice-footer"><span class="choice-votes">${c.votes} vote${c.votes !== 1 ? 's' : ''}</span></div>`;
      } else {
        const gp = c.game_provided ? `<span class="game-provided-badge">auto</span>` : '';
        footer = `
          <div class="choice-footer">
            <span class="choice-submitter">${c.submitter_name || '?'}${gp}</span>
            &nbsp;·&nbsp;<span class="choice-votes">${c.votes} vote${c.votes !== 1 ? 's' : ''}</span>
            &nbsp;· ❤️ <span id="likes-${c.index}">${c.likes || 0}</span>
          </div>`;
      }
      return `
        <div class="choice-card ${isTruth ? 'is-truth' : 'is-lie'}">
          ${isTruth ? '<div class="truth-badge">✓ Truth</div>' : ''}
          <div class="choice-text">${c.text}</div>
          ${footer}
        </div>`;
    }).join('');

    const nextBtn = document.getElementById('next-btn');
    nextBtn.classList.add('visible');
    show('revealing-screen');
  }

  function handleLikeUpdate(data) {
    const el = document.getElementById(`likes-${data.choice_index}`);
    if (el) el.textContent = data.likes;
  }

  document.getElementById('next-btn').addEventListener('click', () => {
    ws.send(JSON.stringify({ type: 'next', data: {} }));
    document.getElementById('next-btn').classList.remove('visible');
  });

  // ── Scores ────────────────────────────────────────────────────────────
  function handleScores(data) {
    renderScoresScreen(data);
    show('scores-screen');
  }

  function renderScoresScreen(data) {
    const r = data.round_complete;
    document.getElementById('scores-header').textContent =
      r ? `After Round ${r}` : 'Scores';
    renderScores(data.scores || [], document.getElementById('scores-list'));
  }

  // ── Game Over ─────────────────────────────────────────────────────────
  function handleGameOver(data) {
    const winners = data.winners || [];
    document.getElementById('winners-banner').textContent =
      winners.length === 1 ? `🏆 ${winners[0]} wins!` : `🏆 Tie: ${winners.join(' & ')}`;
    const cup = data.thumbs_cup;
    document.getElementById('thumbs-cup').textContent =
      cup ? `👍 Thumbs Cup: ${cup}` : '';
    renderScores(data.final_scores || [], document.getElementById('final-scores-list'));
    show('gameover-screen');
  }
</script>
</body>
</html>
